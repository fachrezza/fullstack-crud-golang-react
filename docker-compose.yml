services:

  postgres:
    image: postgres:16

    container_name: postgres_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: technical_test

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend-test

    container_name: golang_backend

    ports:
      - "8080:8080"

    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend-test

    container_name: react_frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend